<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Basics</title>
</head>
<body>
    <table border="black">
        <caption>Table caption</caption>
        <tr>
            <th>Header 1</th>
            <th>Header 2</th>
        </tr>
        <tr>
            <td>Data 1</td>
            <td>Data 2</td>
        </tr>
    </table>

    <table border="black">
        <caption>Food Menu</caption>
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Orange</td>
            <td>20 Rs</td>
        </tr>
        <tr>
            <td>Apple</td>
            <td>30 Rs</td>
        </tr>
    </table>

    <table border="black">
        <caption>Food Menu</caption>
        <tr>
            <th rowspan="2">Item</th>  <!--rowspan and colspan-->
            <th colspan="2">Price</th>
        </tr>
        <tr>
            <th>INR</th>
            <th>USD</th>
        </tr>
        <tr>
            <td>Frooti</td>
            <td>10</td>
            <td>0.14</td>
        </tr>
        <tr>
            <td>Samosa</td>
            <td>12</td>
            <td>0.17</td>
        </tr>
        <tr>
            <td>Chips</td>
            <td>20</td>
            <td>0.28</td>
        </tr>

        <table border="black">
            <caption>A test table with merged cells</caption>

            <tr>
                <th rowspan="2">

                </th>
                <th colspan="2">
                    Average
                </th>
                <th rowspan="2">
                Red eyes
                </th>
            
            </tr>
            <tr>
                <th>
                    Height
                </th>
                <th>
                    Weight
                </th>
            </tr>
            <tr>
                <td>
                    Males
                </td>
                <td>
                    1.9
                </td>
                <td>
                    0.003
                </td>
                <td>
                    40%
                </td>
            </tr>
            <tr>
                <td>
                    Females
                </td>
                <td>
                    1.7
                </td>
                <td>
                    0.002
                </td>
                <td>
                    43%
                </td>
            </tr>
        </table>

    </table>

</body>
</html>
